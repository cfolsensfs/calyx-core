# Calyx core bundle — intended for copy/sync into project .calyx/core/
# Bump version when moving or renaming paths so downstream sync can detect drift.

version: "0.11"

bundle:
  constitution:
    - constitution/CONSTITUTION.md
  prompts:
    - prompts/10th-man.txt
    - prompts/librarian.txt
    - prompts/broker.txt
    - prompts/import-distill-onepager.txt
  taxonomy:
    - taxonomy/master-tags.yaml
  templates:
    - templates/reasoning-log.md
    - templates/adr.md
    - templates/dot-calyx-README.md
    - templates/calyx-closeout.md
    - templates/distill-external-to-calyx.md
  tooling:
    - tooling/ollama-run.sh
    - tooling/calyx-closeout.sh
    - tooling/scaffold-cursor-app.sh
    - tooling/create-sfs-workspace.sh

# App scaffold (optional): copy bundle for new repos — see tooling/scaffold-cursor-app.sh
app_scaffold_templates:
  - templates/app-scaffold/AGENTS.md
  - templates/app-scaffold/VERSION
  - templates/app-scaffold/cursorrules
  - templates/app-scaffold/dot-calyx-README.md
  - templates/app-scaffold/reasoning-TEMPLATE.md
  - templates/app-scaffold/ADR-TEMPLATE.md
  - templates/app-scaffold/local-tags.yaml
  - templates/app-scaffold/gitignore
  - templates/app-scaffold/README.md
  - templates/app-scaffold/docs-GIT.md
  - templates/app-scaffold/apps-web-README.md
  - templates/app-scaffold/apps-api-README.md
  - templates/app-scaffold/mcp-README.md
  - templates/app-scaffold/packages-shared-README.md
  - templates/app-scaffold/infra-README.md

optional:
  docs:
    - docs/new-project.md
    - docs/ux-flow.md
    - docs/workflow.md
    - docs/glossary.md
  examples:
    - examples/sample-reasoning-log.md
